---
api_version: 2.0
uuid: 8210604b-7ba2-4725-b59a-f8878036ee52
name: Changing RDP Port to Non Standard Port via Powershell
authors:
  - isaac_fletcher
description: |
  Changing RDP Port to Non Standard Port via Powershell

mitre:
  tactics:
    - "TA0008 Lateral Movement"
  techniques:
    - "T1021 Remote Services"
  subtechniques:
    - "T1021.001 Remote Desktop Protocol"

requirements:
  platforms:
    - os: windows
  superuser: true

args:
  - name: old_remote_port
    description: Default RDP Listening Port
    type: string
    default: "3389"
  - name: new_remote_port
    description: New RDP Listening Port
    type: string
    default: "4489"

steps:
  - name: change_rdp_port
    executor: powershell
    inline: |
      Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "PortNumber" -Value {{.Args.new_remote_port}}
      New-NetFirewallRule -DisplayName 'RDPPORTLatest-TCP-In' -Profile 'Public' -Direction Inbound -Action Allow -Protocol TCP -LocalPort {{.Args.new_remote_port}}
    cleanup:
      executor: powershell
      inline: |
        Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "PortNumber" -Value {{.Args.old_remote_port}}
        Remove-NetFirewallRule -DisplayName "RDPPORTLatest-TCP-In" -ErrorAction Ignore
        Get-Service TermService | Restart-Service -Force -ErrorAction Ignore
