---
api_version: 2.0
uuid: 81d231c1-d5b1-4132-8b44-e4733e58b904
name: "pip Package Installer"
authors:
  - jazzyle
description: |
  "This helper-TTP is designed to install python libraries needed for other ttps."
mitre:
  tactics:
    - TA0002 Execution
  techniques:
    - T1059 Command and Scripting Interpreter
  subtechniques:
    - T1059.006 Python
args:
  - name: modules
    description: |
      Space delimited list of python libraries needed to be installed
    type: string
steps:
  - name: pip_check
    description: |
      Checks if pip is installed.
    executor: python3
    inline: |
      import sys
      import subprocess
      try:
        import pip
      except ImportError:
        try:
          subprocess.run([sys.executable, "-m", "ensurepip", "--upgrade"], check=True)
        except:
          print("pip is not installed. Please install pip and try again.", file=sys.stderr)
          sys.exit(1)

  - name: install
    description: "Installing python packages: {{.Args.modules}}"
    executor: python3
    inline: |
      import sys
      import shlex
      import subprocess
      modules = shlex.split("{{.Args.modules}}")
      subprocess.run([sys.executable, "-m", "pip", "install", *modules], check=True)
