---
api_version: 2.0
uuid: 81d231c1-d5b1-4132-8b44-e4733e58b904
name: "pip Package Installer"
authors:
  - jazzyle
  - isaac_fletcher
description: |
  "This helper-TTP is designed to install python libraries needed for other ttps."
mitre:
  tactics:
    - TA0002 Execution
  techniques:
    - T1059 Command and Scripting Interpreter
  subtechniques:
    - T1059.006 Python
args:
  - name: modules
    description: Space-separated list of Python packages to install
    type: string
  - name: proxy
    description: Optional proxy address for pip install
    default: ""
steps:
  - name: install
    description: "Install Python packages: {{.Args.modules}}"
    inline: |
      python3 -m ensurepip --upgrade 2>/dev/null || {
        echo "pip is not available and ensurepip failed" >&2
        exit 1
      }

      PROXY_FLAG=""
      {{if .Args.proxy}}
      PROXY_FLAG="--proxy {{.Args.proxy}}"
      {{end}}

      for pkg in {{.Args.modules}}; do
        if python3 -m pip show "${pkg}" >/dev/null 2>&1; then
          echo "[*] ${pkg} already installed, skipping"
        else
          echo "[*] Installing ${pkg}"
          python3 -m pip install -q "${pkg}" ${PROXY_FLAG}
        fi
      done
