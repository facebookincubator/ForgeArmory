---
api_version: 2.0
uuid: c3fc70cc-40f1-4cf6-ae50-81d3d9a88a16
name: Enumerate AS-REP Roastable Users via LDAP
authors:
  - isaac_fletcher
description: |
  This TTP uses LDAP to enumerate Active Directory user accounts that are vulnerable
  to AS-REP roasting. AS-REP roasting targets accounts with Kerberos pre-authentication
  disabled (DONT_REQUIRE_PREAUTH flag set). These accounts can be attacked without
  credentials by requesting AS-REP tickets and cracking them offline.
requirements:
  platforms:
    - os: linux
    - os: darwin
mitre:
  tactics:
    - TA0007 Discovery
  techniques:
    - T1087 Account Discovery
  subtechniques:
    - T1087.002 Domain Account
args:
  - name: domain
    description: The target Active Directory domain (e.g., contoso.com)
    default: contoso.local
  - name: dc
    description: The Domain Controller IP or hostname to target
    default: dc01.contoso.local
  - name: bind_user
    description: The bind username in DOMAIN\\user format for LDAP authentication
  - name: bind_password
    description: The password for the bind user
  - name: use_ldaps
    description: Use LDAPS (LDAP over SSL, port 636) instead of LDAP (port 389)
    type: bool
    default: false
steps:
  - name: enumerate_asrep_roastable_users
    description: Enumerate Active Directory accounts vulnerable to AS-REP roasting via LDAP search
    ttp: //utils/query-ldap/ttp.yaml
    args:
      domain: "{{ .Args.domain }}"
      dc: "{{ .Args.dc }}"
      bind_user: '{{ .Args.bind_user }}'
      bind_password: "{{ .Args.bind_password }}"
      search_filter: "'(&(UserAccountControl:1.2.840.113556.1.4.803:=4194304)(!(UserAccountControl:1.2.840.113556.1.4.803:=2))(!(objectCategory=computer)))' sAMAccountName userPrincipalName distinguishedName"
      use_ldaps: "{{ .Args.use_ldaps }}"
